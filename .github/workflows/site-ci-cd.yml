name: Site CI/CD

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/sonnazgroup-site
  ASTRO_TELEMETRY_DISABLED: 1

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Ensure cache directories exist (pre-restore)
        run: |
          mkdir -p ~/.cache
          mkdir -p ~/.cache/sharp
          mkdir -p .astro
          mkdir -p .cache
          mkdir -p node_modules/.cache

      - name: Restore build caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache
            ~/.cache/sharp
            site/.astro
            site/.cache
            site/node_modules/.cache
          key: build-cache-${{ runner.os }}-${{ hashFiles('site/package-lock.json') }}
          restore-keys: |
            build-cache-${{ runner.os }}-

      - name: Show restored caches
        run: |
          echo "Listing home ~/.cache"
          ls -la ~/.cache || true
          du -sh ~/.cache || true
          echo "Listing home ~/.cache/sharp"
          ls -la ~/.cache/sharp || true
          du -sh ~/.cache/sharp || true
          echo "Listing site/.astro"
          ls -la .astro || true
          du -sh .astro || true
          echo "Listing site/.cache"
          ls -la .cache || true
          du -sh .cache || true
          echo "Listing node_modules/.cache"
          ls -la node_modules/.cache || true
          du -sh node_modules/.cache || true

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Ensure cache directories exist
        run: |
          mkdir -p .astro
          mkdir -p .cache
          mkdir -p node_modules/.cache
          mkdir -p ~/.cache
          mkdir -p ~/.cache/sharp

  image:
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image metadata
        id: meta
        run: |
          IMAGE_REPOSITORY="$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          BRANCH_TAG="$(echo "${GITHUB_REF_NAME}" | tr '/[:upper:]' '-[:lower:]' | tr -cd '[:alnum:]_.-')"
          IMAGE_REF="${IMAGE_REPOSITORY}:${GITHUB_SHA}"
          BRANCH_REF="${IMAGE_REPOSITORY}:${BRANCH_TAG}"
          echo "image_ref=${IMAGE_REF}" >> "${GITHUB_OUTPUT}"
          echo "branch_ref=${BRANCH_REF}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Show repo caches (image job)
        run: |
          echo "site/.astro"
          ls -la site/.astro || true
          du -sh site/.astro || true
          echo "site/.cache"
          ls -la site/.cache || true
          du -sh site/.cache || true
          echo "site/node_modules/.cache"
          ls -la site/node_modules/.cache || true
          du -sh site/node_modules/.cache || true

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: site/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_ref }}
            ${{ steps.meta.outputs.branch_ref }}
          build-args: |
            PUBLIC_DEPLOY_ENV=${{ github.ref_name == 'main' && 'production' || 'staging' }}
          cache-from: |
            type=registry,ref=${{ steps.meta.outputs.branch_ref }}
            type=gha
          cache-to: |
            type=registry,mode=max,ref=${{ steps.meta.outputs.branch_ref }}
            type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: image
    if: vars.V2_DEPLOY_ENABLED == 'true' && (github.ref_name == 'develop' || github.ref_name == 'main')
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - name: Deploy on droplet
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_REF: ${{ needs.image.outputs.image_ref }}
          DEPLOY_ENV: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: IMAGE_REF,DEPLOY_ENV
          script: |
            set -euo pipefail
            "${{ secrets.V2_DEPLOY_SCRIPT_PATH }}" "${IMAGE_REF}" "${DEPLOY_ENV}"
