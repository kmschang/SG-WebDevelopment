<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Sonnaz Group</title>
    <link rel="icon" type="image/png" sizes="256x256" href="../Assets/favicon.png">
    <link rel="stylesheet" href="../scss/bootstrap.min.css">
</head>
<body>

<section class="bg-Sonnaz-Light-Gray py-5 contact-liquid">
    <div class="container py-5">
        <div class="contact-glass-shell">
            <div class="text-center mb-5">
                <p class="contact-kicker default-font mb-2">Sonnaz Group</p>
                <h1 class="text-white default-font page-header mb-3">Get in Touch</h1>
            </div>
            <div class="row row-cols-1 row-cols-lg-3 g-4">
                <div class="col">
                    <article class="contact-glass-card h-100">
                        <div class="contact-icon-wrap">
                            <img src="../Assets/Icons/Icon_Contact_Pin_White.svg" alt="Location">
                        </div>
                        <h5 class="mt-3 default-font text-white rectangle-title">Location</h5>
                        <p class="default-font text-white mb-0">Michigan, United States</p>
                    </article>
                </div>
                <div class="col">
                    <article class="contact-glass-card h-100">
                        <div class="contact-icon-wrap">
                            <img src="../Assets/Icons/Icon_Contact_Phone_White.svg" alt="Phone">
                        </div>
                        <h5 class="mt-3 default-font text-white rectangle-title">Call</h5>
                        <p class="default-font text-white mb-0"><a class="contact-link" href="tel:+2484441950">+1 (248) 444-1950</a></p>
                    </article>
                </div>
                <div class="col">
                    <article class="contact-glass-card h-100">
                        <div class="contact-icon-wrap">
                            <img src="../Assets/Icons/Icon_Contact_Mail_White.svg" alt="Email">
                        </div>
                        <h5 class="mt-3 default-font text-white rectangle-title">Email</h5>
                        <p class="default-font text-white mb-0"><a class="contact-link" href="mailto:support@sonnazgroup.com">support@sonnazgroup.com</a></p>
                    </article>
                </div>
            </div>
        </div>
    </div>
</section>


<button id="backToTopBtn" class="back-to-top-btn">
    <img src="../Assets/Icons/Icon_BackToTop.png" alt="Back to Top Icon" class="img-fluid" style="height: 75px">
</button>

<script src="../js/navbar.js"></script>
<script src="../js/custom.js"></script>
<script src="../js/bootstrap.min.js"></script>
</body>
</html>
